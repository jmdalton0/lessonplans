<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Lessons</title>
</head>

<body>
    <main layout:fragment="content">
        <div id="lessons-menu" class="mt">
            <h2 class="mt">All Lessons</h2>
            <ul>
                <li th:each="group : ${data.keySet()}" class="group">
                    <h3 th:text="${group}" class="group-name">Group</h3>
                    <ul>
                        <li th:each="lesson : ${data.get(group)}" class="lesson">
                            <a th:href="@{/lessons/{group}/{slug} (group = ${group}, slug = ${lesson.slug()})}" th:text="${lesson.name()}" class="lesson-name">Lesson</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </main>
</body>

</html>
