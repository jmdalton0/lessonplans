<!DOCTYPE html>
<html lang="en" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Lessons</title>
</head>

<body>
    <main layout:fragment="content">
        <div class="m">
            <h2>All Lessons</h2>
            <ul>
                <li th:each="groupId : ${data.keySet()}" class="group">
                    <h3 th:text="${data.get(groupId).getFirst().groupName}" class="group-name">Group</h3>
                    <ul>
                        <li th:each="lesson : ${data.get(groupId)}" class="lesson">
                            <a th:href="@{/lessons/{group}/{slug} (group = ${lesson.groupSlug}, slug = ${lesson.lessonSlug})}" th:text="${lesson.lessonName()}" class="lesson-name">Lesson</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </main>
</body>

</html>
